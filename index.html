<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background: #F5F5F0; margin: 0; padding-bottom: 50px; }
    .header { background: #1E4620; color: white; text-align: center; padding: 22px; }
    .banner { background: #163514; color: #7FD98A; text-align: center; padding: 12px; font-weight: bold; font-size: 14px; }
    .container { max-width: 500px; margin: 0 auto; padding: 15px; }
    .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #E5E5E0; }
    .drink-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .drink-card { border: 2px solid #EEE; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
    .drink-card.selected { border-color: #1E4620; background: #F0F7F0; box-shadow: 0 0 0 1px #1E4620; }
    .drink-img { width: 100%; height: 120px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; }
    .name-zh { font-size: 14px; font-weight: bold; }
    input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #D5D5CF; border-radius: 8px; box-sizing: border-box; }
    .btn { width: 100%; padding: 16px; background: #1E4620; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="header"><h1>參訪活動預約平台</h1></div>
  <div class="banner">歡迎蒞臨 Ohio State University · 2026 / 5 / 19</div>
  <div class="container">
    <div id="form-area">
      <div class="card"><label>您的姓名 Name *</label><input type="text" id="name" placeholder="請輸入姓名"></div>
      <div class="card"><div style="margin-bottom:10px; font-weight:bold;">飲品選擇 Beverage</div><div class="drink-grid" id="grid">載入中...</div></div>
      <div class="card"><label>備註 Notes</label><textarea id="notes" rows="2" placeholder="特殊需求"></textarea></div>
      <button class="btn" onclick="submit()">確認送出 Confirm</button>
    </div>
    <div id="success" style="display:none; text-align:center; padding:60px;"><h2>✓ 預約成功！</h2><p>我們已收到您的訂單。</p></div>
  </div>
  <script>
    let selectedId = null; let menu = [];
    window.onload = () => {
      google.script.run.withSuccessHandler(items => {
        menu = items; const grid = document.getElementById('grid'); grid.innerHTML = '';
        items.forEach(item => {
          const div = document.createElement('div'); div.className = 'drink-card';
          div.onclick = () => { selectedId = item.id; document.querySelectorAll('.drink-card').forEach(c => c.classList.remove('selected')); div.classList.add('selected'); };
          div.innerHTML = `<img src="${item.img}" class="drink-img"><div class="name-zh">${item.name}</div>`;
          grid.appendChild(div);
        });
      }).getMenuItems();
    };
    function submit() {
      const name = document.getElementById('name').value.trim();
      if (!name || !selectedId) return alert('請填寫姓名並選擇飲品');
      const item = menu.find(m => m.id === selectedId);
      google.script.run.withSuccessHandler(() => { document.getElementById('form-area').style.display = 'none'; document.getElementById('success').style.display = 'block'; }).submitOrder({
        visitDate: '2026-05-19', name: name, department: 'Ohio State University', itemName: item.name, temperature: '-', iceLevel: '-', notes: document.getElementById('notes').value
      });
    }
  </script>
</body>
</html>
